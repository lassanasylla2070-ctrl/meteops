version: "3.9"

services:

  backend:
    build:
      context: ./weather-app-backend
    container_name: meteops-backend
    env_file:
      - ./weather-app-backend/.env
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./weather-app-frontend
    container_name: meteops-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
