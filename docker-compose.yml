services:
  backend:
    build:
      context: ./weather-app-backend
      network: host
    container_name: meteops-backend
    network_mode: host
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  frontend:
    build:
      context: ./weather-app-frontend
      network: host
    container_name: meteops-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: meteops-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: meteops-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: meteops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
  node-exporter:
    image: prom/node-exporter:latest
    container_name: meteops-node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
