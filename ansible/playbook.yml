---
- name: Déploiement MeteoPS
  hosts: meteops_vps
  become: true
  vars_files:
    - vars.yml

  tasks:
    - name: Mise à jour des paquets
      apt:
        update_cache: yes
        upgrade: yes

    - name: Installer les dépendances
      apt:
        name:
          - git
          - docker.io
          - docker-compose
        state: present

    - name: Démarrer Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Installer les dépendances Kubernetes
      apt:
        name:
          - apt-transport-https
          - curl
          - gnupg
        state: present

    - name: Installer K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Vérifier que K3s est actif
      systemd:
        name: k3s
        state: started
        enabled: true

    - name: Cloner le dépôt MétéOps
      git:
        repo: 'https://github.com/lassanasylla2070-ctrl/meteops.git'
        dest: /home/debian/meteops
        version: main
        force: yes

    - name: Créer le fichier .env.production du frontend
      copy:
        dest: /home/debian/meteops/weather-app-frontend/.env.production
        content: |
          REACT_APP_ENV={{ frontend_env.REACT_APP_ENV }}
          REACT_APP_API_URL={{ frontend_env.REACT_APP_API_URL }}:3001/api/v1/
          REACT_APP_DEFAULT_CITY={{ frontend_env.REACT_APP_DEFAULT_CITY }}

    - name: Créer le fichier .env.development du frontend
      copy:
        dest: /home/debian/meteops/weather-app-frontend/.env.development
        content: |
          REACT_APP_ENV={{ frontend_env.REACT_APP_ENV }}
          REACT_APP_API_URL={{ frontend_env.REACT_APP_API_URL }}:3001/api/v1/
          REACT_APP_DEFAULT_CITY={{ frontend_env.REACT_APP_DEFAULT_CITY }}

    - name: Créer le fichier .env du backend
      copy:
        dest: /home/debian/meteops/.env
        content: |
          PORT={{ backend_env.PORT }}
          ENV={{ backend_env.ENV }}
          DATABASE_NAME=weather
          DATABASE_SYNC={{ backend_env.DATABASE_SYNC }}
          WEATHER_API_URL={{ backend_env.WEATHER_API_URL }}
          DEBUG={{ backend_env.DEBUG }}

    - name: Générer le manifest Kubernetes backend
      template:
        src: templates/backend-deployment.yaml.j2
        dest: /tmp/backend-deployment.yaml

    - name: Générer le manifest Kubernetes frontend
      template:
        src: templates/frontend-deployment.yaml.j2
        dest: /tmp/frontend-deployment.yaml

    - name: Appliquer le manifest backend sur K3s
      command: k3s kubectl apply -f /tmp/backend-deployment.yaml

    - name: Appliquer le manifest frontend sur K3s
      command: k3s kubectl apply -f /tmp/frontend-deployment.yaml
