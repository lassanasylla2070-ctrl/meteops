name: MeteOps CI-CD Pipeline

# Déclenchement sur push main
on:
  push:
    branches:
      - main

jobs:

  # =========================
  # 1. BUILD + TEST
  # =========================
  build-test:
    runs-on: ubuntu-latest

    steps:
      # Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------- BACKEND --------
      - name: Install backend dependencies
        working-directory: ./weather-app-backend
        run: npm install

      - name: Run backend tests
        working-directory: ./weather-app-backend
        run: npm test || echo "No tests found"

      # -------- FRONTEND --------
      - name: Install frontend dependencies
        working-directory: ./weather-app-frontend
        run: npm install

      - name: Build frontend
        working-directory: ./weather-app-frontend
        run: npm run build


  # =========================
  # 2. DOCKER + SECURITY
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      # Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ================= BACKEND =================
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/meteops-backend:latest ./weather-app-backend

      # Scan sécurité backend (Trivy)
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/meteops-backend:latest

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/meteops-backend:latest

      # ================= FRONTEND =================
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/meteops-frontend:latest ./weather-app-frontend

      # Scan sécurité frontend (Trivy)
      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/meteops-frontend:latest

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/meteops-frontend:latest
